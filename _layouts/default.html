<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  {% seo %}
</head>
<body>
  {% include header.html %}
  {% if page.banner %}
  <div class="site-banner">
    <img src="{{ page.banner | relative_url }}" alt="Banner">
  </div>
  {% elsif page.url == "/" %}
  <div class="site-banner">
    <div class="banner-placeholder">Drop your banner image at assets/images/banner.jpg</div>
  </div>
  {% endif %}
  <main class="site-main">
    {{ content }}
  </main>
  {% include footer.html %}
</body>
</html>
