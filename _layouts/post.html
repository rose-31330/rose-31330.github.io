---
layout: default
---
<article class="post-content">
  {% if page.image %}
  <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" class="post-hero-img">
  {% endif %}
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">
      {{ page.date | date: "%B %-d, %Y" }}
    </time>
  </header>
  <div class="post-body">
    {{ content }}
  </div>
  <p class="back-link"><a href="{{ "/blog" | relative_url }}">&larr; Back to blog</a></p>
</article>
