<aside class="sidebar" id="sidebar">

  {% if site.profile_image %}
  <div class="sidebar-avatar">
    <img src="{{ site.profile_image | relative_url }}" alt="{{ site.author }}">
  </div>
  {% endif %}

  <div class="sidebar-brand">
    <a href="{{ "/" | relative_url }}" class="brand-name">Rose Carcaillet</a>
    <span class="brand-sub">MEng Aerospace Engineering · QMUL</span>
  </div>

  <div class="sidebar-section-label">Navigation</div>

  <nav class="sidebar-nav">
    <a href="{{ "/" | relative_url }}"
       class="nav-item{% if page.url == "/" %} active{% endif %}">
      <span class="nav-icon">⊙</span> About
    </a>
    <a href="{{ "/experience/" | relative_url }}"
       class="nav-item{% if page.url contains "experience" %} active{% endif %}">
      <span class="nav-icon">◈</span> Experience
    </a>
    <a href="{{ "/projects/" | relative_url }}"
       class="nav-item{% if page.url contains "projects" %} active{% endif %}">
      <span class="nav-icon">◫</span> Projects
    </a>
    <a href="{{ "/skills/" | relative_url }}"
       class="nav-item{% if page.url contains "skills" %} active{% endif %}">
      <span class="nav-icon">◉</span> Skills
    </a>
    <a href="{{ "/education/" | relative_url }}"
       class="nav-item{% if page.url contains "education" %} active{% endif %}">
      <span class="nav-icon">⊕</span> Education
    </a>
    <a href="{{ "/blog/" | relative_url }}"
       class="nav-item{% if page.url contains "blog" or page.url contains "posts" %} active{% endif %}">
      <span class="nav-icon">◱</span> Blog
    </a>
    <a href="{{ "/contact/" | relative_url }}"
       class="nav-item{% if page.url contains "contact" %} active{% endif %}">
      <span class="nav-icon">◻</span> Resume &amp; Contact
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="lang-section">
      <div class="sidebar-section-label" style="padding: 0 0 0.35rem;">Language</div>
      <div class="lang-buttons">
        <button class="lang-btn active" data-lang="en">English</button>
        <button class="lang-btn" data-lang="fr">Français</button>
      </div>
    </div>

    <div class="sidebar-status">
      <span class="status-dot"></span>
      <span class="lang-en">London, UK</span>
      <span class="lang-fr" style="display:none">Londres, Royaume-Uni</span>
    </div>
  </div>
</aside>

<script>
  (function() {
    var lang = localStorage.getItem('site-lang') || 'en';
    document.addEventListener('DOMContentLoaded', function() {
      applyLang(lang);
      document.querySelectorAll('.lang-btn').forEach(function(btn) {
        btn.addEventListener('click', function() { applyLang(this.dataset.lang); });
      });
    });
    function applyLang(l) {
      lang = l;
      localStorage.setItem('site-lang', l);
      document.querySelectorAll('.lang-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.lang === l);
      });
      document.querySelectorAll('.lang-en').forEach(function(el) {
        el.style.display = (l === 'en') ? '' : 'none';
      });
      document.querySelectorAll('.lang-fr').forEach(function(el) {
        el.style.display = (l === 'fr') ? '' : 'none';
      });
    }
  })();
</script>
